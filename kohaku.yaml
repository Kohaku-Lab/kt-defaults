name: kt-defaults
version: "0.4.0"
description: "Default creatures, terrariums, plugins, tools, I/O, and triggers for KohakuTerrarium"
author: "Kohaku-Lab"
repository: "https://github.com/Kohaku-Lab/kt-defaults"

creatures:
  - name: general
    path: creatures/general
    description: "Base creature: 22 tools, 6 sub-agents, core personality"

  - name: swe
    path: creatures/swe
    description: "Software engineering specialist"
    base: general

  - name: reviewer
    path: creatures/reviewer
    description: "Code review specialist"
    base: general

  - name: ops
    path: creatures/ops
    description: "Infrastructure and operations specialist"
    base: general

  - name: researcher
    path: creatures/researcher
    description: "Research and analysis specialist"
    base: general

  - name: creative
    path: creatures/creative
    description: "Creative writing specialist"
    base: general

  - name: root
    path: creatures/root
    description: "Terrarium management, task delegation"
    base: general

terrariums:
  - name: swe_team
    path: terrariums/swe_team
    description: "SWE team with root agent, swe, and reviewer"
    uses: [swe, reviewer, root]

  - name: deep_research
    path: terrariums/deep_research
    description: "Multi-agent web research: planner, researcher, synthesizer, critic"
    uses: [general]

  - name: auto_research
    path: terrariums/auto_research
    description: "Automated research loop: ideator, coder, runner, analyzer"
    uses: [general]

plugins:
  - name: cost_tracker
    module: kt_defaults.plugins.cost_tracker
    class: CostTrackerPlugin
    description: "Track LLM token usage and estimated cost per session"

  - name: event_logger
    module: kt_defaults.plugins.event_logger
    class: EventLoggerPlugin
    description: "Structured JSONL event log of all agent activity"

  - name: multimodal_guard
    module: kt_defaults.plugins.multimodal_guard
    class: MultimodalGuardPlugin
    description: "Rewrite multimodal LLM input into text-only placeholders before model calls"

tools:
  - name: database
    module: kt_defaults.tools.database
    class: DatabaseTool
    description: "Execute SQL queries against a SQLite database"

io:
  - name: discord_input
    module: kt_defaults.io.discord
    class: DiscordInput
    description: "Receive messages from Discord channels"

  - name: discord_output
    module: kt_defaults.io.discord
    class: DiscordOutput
    description: "Send agent responses to Discord channels"

triggers:
  - name: webhook
    module: kt_defaults.triggers.webhook
    class: WebhookTrigger
    description: "Receive HTTP POST webhooks as agent events"
