# Deep Research Terrarium
# Multi-agent web research system: search, read, synthesize, cite.
#
# Topology (bidirectional where needed):
#   root -> questions -> planner
#   planner -> tasks -> researcher
#   researcher -> findings -> synthesizer
#   researcher -> tasks (can request more sub-questions)
#   synthesizer -> drafts -> critic
#   synthesizer -> tasks (can request follow-up searches)
#   critic -> feedback -> planner (gaps found, re-search)
#   critic -> final (approved)
#   all -> report_to_root (auto-injected)
#   team_chat for coordination
#
# Usage:
#   kt terrarium run @kohaku-creatures/terrariums/deep_research/

terrarium:
  name: deep_research

  root:
    base_config: "@kohaku-creatures/creatures/root"
    controller:
      tool_format: native

  creatures:
    - name: planner
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a research planner. You decompose research questions into
        concrete, searchable sub-questions.

        WORKFLOW:
        1. Receive a research question from "questions"
        2. Break it into 3-7 specific sub-questions
        3. Send each sub-question to "tasks"
        4. If you receive feedback from the critic, generate additional
           sub-questions to fill identified gaps

        RULES:
        - Sub-questions should be independent (parallel-searchable)
        - Be specific: "what is X's pricing model" not "learn about X"
        - After feedback, only generate NEW sub-questions
        - Use team_chat to coordinate with researcher on priorities
      tools:
        - { name: think, type: builtin }
        - { name: web_search, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [questions, feedback, team_chat]
        can_send: [tasks, team_chat]

    - name: researcher
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a web researcher. You search, read pages, and extract info.

        WORKFLOW:
        1. Receive a sub-question from "tasks"
        2. Search the web with multiple query variations
        3. Read the most promising pages
        4. Extract key facts with source URLs
        5. Send findings to "findings"
        6. If you find the question needs refinement, send clarification to "tasks"

        RULES:
        - Always include source URLs for every claim
        - Prefer primary sources over secondary
        - Note conflicting information
        - If a search yields nothing useful, say so honestly
      tools:
        - { name: web_search, type: builtin }
        - { name: web_fetch, type: builtin }
        - { name: think, type: builtin }
        - { name: scratchpad, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [tasks, team_chat]
        can_send: [findings, tasks, team_chat]

    - name: synthesizer
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a research synthesizer. You combine findings into reports.

        WORKFLOW:
        1. Collect findings from "findings" (wait for multiple messages)
        2. Organize by theme, resolve contradictions
        3. Write a comprehensive report with citations
        4. If you need more info, send follow-up questions to "tasks"
        5. Send the draft to "drafts"

        RULES:
        - Every claim must have a citation (URL)
        - Present multiple perspectives when sources disagree
        - Include "Key Findings" summary at top
        - Include "Gaps and Limitations" section
        - Use markdown formatting
      tools:
        - { name: think, type: builtin }
        - { name: write, type: builtin }
        - { name: read, type: builtin }
        - { name: scratchpad, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [findings, team_chat]
        can_send: [drafts, tasks, team_chat]

    - name: critic
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a research critic. You review reports for quality and accuracy.

        WORKFLOW:
        1. Read the draft from "drafts"
        2. Check: claims supported by citations? Gaps in coverage? Bias?
        3. If gaps found: send specific follow-up questions to "feedback"
        4. If satisfactory: send final version to "final"

        RULES:
        - Be constructive with specific actionable feedback
        - Maximum 2 feedback rounds, then approve with noted limitations
        - Verify key claims by doing your own web searches
        - The final report should include your review notes
      tools:
        - { name: think, type: builtin }
        - { name: web_search, type: builtin }
        - { name: web_fetch, type: builtin }
        - { name: read, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [drafts, team_chat]
        can_send: [feedback, final, team_chat]

  channels:
    questions: { type: queue, description: "Research questions from root" }
    tasks:     { type: queue, description: "Sub-questions for researchers" }
    findings:  { type: queue, description: "Research findings with citations" }
    drafts:    { type: queue, description: "Draft reports for review" }
    feedback:  { type: queue, description: "Critic feedback to planner" }
    final:     { type: queue, description: "Final approved reports" }
    team_chat: { type: broadcast, description: "Cross-creature coordination" }
