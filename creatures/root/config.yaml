name: root
version: "1.0"
base_config: "@kt-biome/creatures/general"

system_prompt_file: prompts/system.md

# Terrarium management tools on top of everything inherited from general.
# `add_timer` / `watch_channel` / `add_schedule` are already inherited via
# general's tools list (they're exposed there via type: trigger).
tools:
  - { name: terrarium_create, type: builtin }
  - { name: terrarium_status, type: builtin }
  - { name: terrarium_stop, type: builtin }
  - { name: terrarium_send, type: builtin }
  - { name: terrarium_observe, type: builtin }
  - { name: terrarium_history, type: builtin }
  - { name: creature_start, type: builtin }
  - { name: creature_stop, type: builtin }
