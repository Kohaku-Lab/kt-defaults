name: general
version: "1.0"

controller:
  # LLM is resolved from: --llm flag > default model (kt model default) > inline config
  # Set a default: kt model default gemini-3.1-pro
  tool_format: native

system_prompt_file: prompts/system.md
skill_mode: dynamic

tools:
  - { name: bash, type: builtin }
  - { name: python, type: builtin }
  - { name: read, type: builtin }
  - { name: write, type: builtin }
  - { name: edit, type: builtin }
  - { name: multi_edit, type: builtin }
  - { name: notebook_read, type: builtin }
  - { name: notebook_edit, type: builtin }
  - { name: glob, type: builtin }
  - { name: grep, type: builtin }
  - { name: tree, type: builtin }
  - { name: scratchpad, type: builtin }
  - { name: info, type: builtin }
  - { name: ask_user, type: builtin }
  - { name: json_read, type: builtin }
  - { name: json_write, type: builtin }
  - { name: send_message, type: builtin }
  - { name: stop_task, type: builtin }
  # Setup-able triggers exposed as individual tools — calling one installs
  # the trigger in the background and returns its trigger_id. See
  # src/kohakuterrarium/modules/trigger/callable.py.
  # Note: watch_channel is omitted here — it is more terrarium-specific
  # and opt-in per-creature in the relevant team config.
  - { name: add_timer, type: trigger }
  - { name: add_schedule, type: trigger }
  - { name: search_memory, type: builtin }
  - { name: web_fetch, type: builtin }
  - { name: web_search, type: builtin }

subagents:
  - { name: explore, type: builtin }
  - { name: plan, type: builtin }
  - { name: worker, type: builtin }
  - { name: critic, type: builtin }
  - { name: summarize, type: builtin }
  - { name: research, type: builtin }

# Default-enable every package-provided skill. Local skills under
# ~/.kohakuterrarium/skills/, <cwd>/.kt/skills/, or the creature's own
# prompts/skills/ already auto-activate — the wildcard just extends
# that same policy to skills shipped by installed packages (kt-biome
# itself plus anything else `kt install`ed). The auto-invoke section
# in the system prompt is budget-gated (skill_index_budget_bytes,
# default ~4 KB), so "all skills" doesn't blow up the prompt — overflow
# skills remain reachable via `##info <name>##` / `##skill <name>##`
# / `/<name>`. Descendant creatures can override by declaring their
# own `skills:` list (child replaces base).
skills:
  - "*"

# Default-on plugins: zero-friction upgrades that every creature
# inheriting from `general` benefits from. Keep this list small and
# conservative — anything with user-visible behavior changes (e.g.
# circuit_breaker, injection_scanner) stays opt-in.
#
# Child creatures can override individual plugins by name (same-name
# entry wins) or disable the whole block via `no_inherit: [plugins]`.
plugins:
  # Auto-discover AGENTS.md / .cursorrules / .hermes.md from cwd up to
  # the git root and inject them into every turn's context. Standard
  # expectation for modern coding agents. Zero cost when no files exist.
  - name: context_files
    type: package
    module: kt_biome.plugins.context_files
    class: ContextFilesPlugin

  # Inject model-family-specific system-prompt guidance (OpenAI/Codex
  # vs Gemini/Gemma idioms). Pure pre_llm_call addition — no runtime
  # cost, no behavior surprises.
  - name: family_guidance
    type: package
    module: kt_biome.plugins.family_guidance
    class: FamilyGuidancePlugin

  - name: otel_metrics
    module: kt_biome.plugins.otel_metrics
    class: OTelMetricsPlugin

output:
  type: stdout
  controller_direct: true

memory:
  embedding:
    provider: model2vec
    model: "@multilingual-best"
    # model2vec presets (no torch, numpy-only):
    #   @tiny (2M/64d), @base (8M/256d), @retrieval (32M/512d),
    #   @best (static-retrieval-mrl/1024d/Matryoshka),
    #   @multilingual (128M/256d/101langs),
    #   @multilingual-best (static-similarity-mrl/1024d/51langs),
    #   @science (32M/256d)
    # sentence-transformer presets (needs torch):
    #   @tiny (granite-30m), @small (granite-47m/8K),
    #   @base (gte-modernbert/8K), @nomic (nomic-v1.5/8K),
    #   @gemma (embeddinggemma-300m), @multilingual (gte-multilingual/8K/70langs)
    # Or use any HuggingFace model path directly

# compact.max_tokens auto-derived from model's max_context
